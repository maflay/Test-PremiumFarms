<!DOCTYPE html>
<html>

<head>
    <title>Contacto Premium Farms S.A</title>
</head>

<body>
    <section class="main_contacto">
        <div class="content_contacto">
            <img src="/assets/logo_p_f.png" alt="Farms">
            <h2>Contacto</h2>
            <div class="content_input">
                <div class="content_input_con">
                    <input id="nombre" type="text" required>
                    <label for="nombre">Nombre :</label>
                </div>
            </div>
            <div class="content_input">
                <div class="content_input_con">
                    <select name="pais_con" id="pais_contacto">
                        <option value="">País</option>
                        <option value="EC">Ecuador</option>
                        <option value="CH">China</option>
                        <option value="CO">Colombia</option>
                        <option value="OTROS">Otro</option>
                    </select>
                </div>
                <div id="_input_otro_pais" class="content_input_con _display_none">
                    <input type="text" id="_pais_espe" required>
                    <label for="_pais_espe">Tu pais :</label>
                </div>
            </div>
            <div class="content_input">
                <div class="content_input_con">
                    <select name="indicativo" id="indicativo">
                        <option value="">Indicativo...</option>
                        <option value="+1">Estados Unidos / Canadá (+1)</option>
                        <option value="+52">México (+52)</option>
                        <option value="+54">Argentina (+54)</option>
                        <option value="+591">Bolivia (+591)</option>
                        <option value="+55">Brasil (+55)</option>
                        <option value="+56">Chile (+56)</option>
                        <option value="+57">Colombia (+57)</option>
                        <option value="+506">Costa Rica (+506)</option>
                        <option value="+53">Cuba (+53)</option>
                        <option value="+593">Ecuador (+593)</option>
                        <option value="+503">El Salvador (+503)</option>
                        <option value="+502">Guatemala (+502)</option>
                        <option value="+504">Honduras (+504)</option>
                        <option value="+505">Nicaragua (+505)</option>
                        <option value="+507">Panamá (+507)</option>
                        <option value="+595">Paraguay (+595)</option>
                        <option value="+51">Perú (+51)</option>
                        <option value="+1-809">Rep. Dominicana (+1-809)</option>
                        <option value="+1-787">Puerto Rico (+1-787)</option>
                        <option value="+598">Uruguay (+598)</option>
                        <option value="+58">Venezuela (+58)</option>
                        <option value="+86">China (+86)</option>
                        <!-- Otros prefijos del Caribe -->
                        <option value="+1-242">Bahamas (+1-242)</option>
                        <option value="+1-876">Jamaica (+1-876)</option>
                        <option value="+501">Belice (+501)</option>
                    </select>
                </div>
                <div class="content_input_con">
                    <input type="text" id="telefono" required>
                    <label for="telefono">Teléfono :</label>
                </div>
            </div>
            <div class="content_input_con">
                <p>Déjanos tu opinión</p>
                <textarea placeholder="Déjanos tu opinión" class="form-control" name="descripcion_contacto"
                    id="descripcion_contacto"></textarea>
            </div>
            <div class="content_input_con content_btn_send">
                <button class="btn btn-info">Enviar</button>
            </div>
        </div>
        <div class="content_img_contacto">

        </div>
    </section>
</body>

</html>
